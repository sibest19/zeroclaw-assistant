# ZeroClaw assistant — full stack: agent (Telegram + Codex + MCP client) +
# comms (WhatsApp archive + local embeddings + MCP server). They talk over the
# compose network: ZeroClaw → http://comms:8765/mcp.
#
# Avvio:
#   ./setup-zc-data.sh           # popola zc-data (config + persona + auth Codex)
#   cp .env.example .env         # se non l'hai già fatto; metti il bot token
#   docker compose up -d
#   docker compose logs -f comms   # scansiona il QR WhatsApp (solo primo avvio)

services:
  # ASR locale (parakeet-tdt-0.6b-v3 via NeMo, CPU) per trascrivere i vocali.
  transcriber:
    build:
      context: ./transcriber
    image: zeroclaw-transcriber:local
    container_name: zeroclaw-transcriber
    restart: unless-stopped
    volumes:
      - ./transcriber/models:/models # cache pesi modello (~2.4GB, scaricati una volta)
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8770/health').read() else 1)",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 600s # primo avvio: scarica + carica il modello (lento su CPU)

  comms:
    build:
      context: ./comms
    image: zeroclaw-comms:local
    container_name: zeroclaw-comms
    restart: unless-stopped
    environment:
      # Trascrizione vocali via il servizio transcriber (rete compose).
      TRANSCRIBER_URL: "http://transcriber:8770/transcribe"
      # Fuso orario di Simone: date/orari mostrati in ora locale (non UTC).
      TZ: "Europe/Rome"
      DISPLAY_TZ: "Europe/Rome"
    env_file:
      - .env # EMAIL_ACCOUNTS_JSON (app password Gmail) — non committato
    volumes:
      # Riusa archivio + sessione WhatsApp già esistenti (niente re-pairing/re-sync).
      # Contiene anche models/ (cache del modello di embedding).
      - ./comms/data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8765/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s # primo avvio: può scaricare il modello

  zeroclaw:
    # Build dal submodule upstream (vendor/zeroclaw, pinnato) col NOSTRO Dockerfile.
    # Nessuna modifica all'upstream. Aggiornare = bump del submodule.
    build:
      context: ../vendor/zeroclaw
      dockerfile: ../../Dockerfile.zeroclaw
    image: zeroclaw:assistant
    container_name: zeroclaw
    restart: unless-stopped
    # Drain pulito: su stop/upgrade, zeroclaw smette di prelevare nuovi update Telegram
    # e ATTENDE che i messaggi in volo finiscano (e rispondano) prima di uscire. 90s
    # copre una risposta lenta (gpt-5.5 + tool). Gli update che arrivano nel frattempo
    # restano in coda su Telegram (ritenzione 24h) e li prende l'istanza nuova → no perdite.
    stop_grace_period: 90s
    depends_on:
      comms:
        # Ordine di avvio: aspetta che l'MCP di comms sia su prima di connettersi.
        # NIENTE restart:true → un riavvio/upgrade di comms NON riavvia zeroclaw (che
        # tiene il polling Telegram). L'MCP client si ri-handshakea da solo al primo
        # tool-call dopo che comms torna su (reset sessione stale + retry, ~1-3s).
        condition: service_healthy
    environment:
      TZ: "Europe/Rome" # l'agente ragiona su "oggi/ora" in fuso locale
    env_file:
      - .env # secret (bot token, ecc.) come env-override
    volumes:
      - ./zc-data:/zeroclaw-data # config + persona + auth Codex + memoria
    # Gateway non esposto (usiamo Telegram in long-polling). Per la dashboard:
    # ports: ["127.0.0.1:42617:42617"]  # + ENV ZEROCLAW_BIND=0.0.0.0
